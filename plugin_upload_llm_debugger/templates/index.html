<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLM Debugger - AstrBot</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            height: 100vh;
            overflow: hidden;
        }
        .header {
            background: #1e293b;
            padding: 1rem 2rem;
            border-bottom: 1px solid #334155;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 { font-size: 1.25rem; color: #60a5fa; }
        .status {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.875rem;
        }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #10b981;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .container {
            display: grid;
            grid-template-columns: 350px 1fr;
            height: calc(100vh - 60px);
        }
        .sidebar {
            background: #1e293b;
            border-right: 1px solid #334155;
            overflow-y: auto;
            padding: 1rem;
        }
        /* 新增分类过滤器 */
        .filter-bar {
            margin-bottom: 1rem;
            padding: 0.5rem;
            background: #0f172a;
            border-radius: 8px;
        }
        .filter-bar select {
            width: 100%;
            padding: 0.5rem;
            background: #334155;
            color: #e2e8f0;
            border: 1px solid #475569;
            border-radius: 6px;
            font-size: 0.875rem;
            cursor: pointer;
        }
        .filter-bar select option {
            background: #1e293b;
        }
        .record-item {
            background: #334155;
            border-radius: 8px;
            padding: 0.75rem;
            margin-bottom: 0.5rem;
            cursor: pointer;
            transition: all 0.2s;
            border-left: 3px solid transparent;
        }
        .record-item:hover { background: #475569; }
        .record-item.active { 
            background: #2563eb; 
            border-left-color: #60a5fa;
        }
        .record-item.request { border-left-color: #3b82f6; }
        .record-item.response { border-left-color: #10b981; }
        .record-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.25rem;
            font-size: 0.875rem;
            flex-wrap: wrap;
            gap: 0.25rem;
        }
        .record-type {
            padding: 0.125rem 0.5rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .type-request { background: #3b82f6; color: white; }
        .type-response { background: #10b981; color: white; }
        /* 新增用途标签 */
        .purpose-tag {
            font-size: 0.7rem;
            padding: 0.125rem 0.4rem;
            border-radius: 12px;
            background: #475569;
            color: #cbd5e1;
            border: 1px solid #64748b;
            white-space: nowrap;
        }
        .record-meta {
            font-size: 0.75rem;
            color: #94a3b8;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .main-content {
            padding: 2rem;
            overflow-y: auto;
            background: #0f172a;
        }
        .detail-panel {
            background: #1e293b;
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1rem;
        }
        .detail-panel h3 {
            color: #60a5fa;
            margin-bottom: 1rem;
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .json-viewer {
            background: #020617;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 1rem;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 0.875rem;
            line-height: 1.5;
            overflow-x: auto;
            white-space: pre-wrap;
            word-break: break-all;
            max-height: 400px;
            overflow-y: auto;
        }
        .string { color: #a5f3fc; }
        .number { color: #fca5a5; }
        .boolean { color: #fdba74; }
        .null { color: #94a3b8; }
        .key { color: #93c5fd; }
        
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #64748b;
        }
        .connection-lost {
            position: fixed;
            top: 60px;
            right: 20px;
            background: #ef4444;
            color: white;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🔍 LLM Debugger</h1>
        <div class="status">
            <div class="status-dot"></div>
            <span id="conn-status">已连接</span>
            <span id="record-count" style="margin-left: 1rem; color: #94a3b8;">0 条记录</span>
        </div>
    </div>
    
    <div class="connection-lost" id="error-toast">连接断开，正在重连...</div>
    
    <div class="container">
        <div class="sidebar" id="sidebar">
            <!-- 分类过滤器 -->
            <div class="filter-bar">
                <select id="purpose-filter">
                    <option value="all">全部记录</option>
                    <option value="complexity_judge">复杂判断</option>
                    <option value="followup_judge">追问判断</option>
                    <option value="solver_call">解题模型</option>
                    <option value="summarize">精简输出</option>
                    <option value="persona_restate">人设复述</option>
                    <option value="apology">道歉消息</option>
                    <option value="main">主模型（其他）</option>
                </select>
            </div>
            <div id="record-list">
                <!-- 动态渲染 -->
            </div>
        </div>
        
        <div class="main-content" id="main-content">
            <div class="empty-state">
                <div style="font-size: 3rem; margin-bottom: 1rem;">📭</div>
                <div>选择左侧记录查看详情</div>
            </div>
        </div>
    </div>

    <script>
        let ws;
        let records = [];
        let selectedId = null;
        let currentFilter = 'all';  // 当前选中的分类

        const sidebar = document.getElementById('sidebar');
        const mainContent = document.getElementById('main-content');
        const recordCount = document.getElementById('record-count');
        const connStatus = document.getElementById('conn-status');
        const errorToast = document.getElementById('error-toast');
        const purposeFilter = document.getElementById('purpose-filter');

        // 监听过滤器变化
        purposeFilter.addEventListener('change', (e) => {
            currentFilter = e.target.value;
            renderSidebar();
        });

        // 连接 WebSocket
        function connect() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${protocol}//${window.location.host}/ws`);
            
            ws.onopen = () => {
                connStatus.textContent = '已连接';
                connStatus.style.color = '#10b981';
                errorToast.style.display = 'none';
            };
            
            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                records.unshift(data);
                if (records.length > 200) records.pop();
                renderSidebar();
                recordCount.textContent = `${records.length} 条记录`;
                
                if (selectedId) {
                    const selectedRecord = records.find(r => r.id === selectedId);
                    if (selectedRecord && data.conversation_id && data.conversation_id === selectedRecord.conversation_id) {
                        showDetail(selectedRecord);
                    }
                }
            };
            
            ws.onclose = () => {
                connStatus.textContent = '断开';
                connStatus.style.color = '#ef4444';
                errorToast.style.display = 'block';
                setTimeout(connect, 3000);
            };
            
            ws.onerror = () => {
                connStatus.textContent = '错误';
                connStatus.style.color = '#ef4444';
            };
        }

        // 获取记录的目的（用于分类）
        function getPurpose(record) {
            if (record.source && record.source.purpose) {
                return record.source.purpose;
            }
            // 没有 source.purpose 的记录归为 "main"（主模型调用）
            return 'main';
        }

        // 渲染侧边栏（带过滤）
        function renderSidebar() {
            const filteredRecords = records.filter(record => {
                if (currentFilter === 'all') return true;
                return getPurpose(record) === currentFilter;
            });

            const listEl = document.getElementById('record-list');
            if (filteredRecords.length === 0) {
                listEl.innerHTML = '<div style="color: #64748b; text-align: center; padding: 2rem;">没有符合条件的记录</div>';
                return;
            }

            listEl.innerHTML = filteredRecords.map((record) => {
                const isSelected = record.id === selectedId;
                const type = record.type;
                const time = new Date(record.timestamp).toLocaleTimeString();
                const sender = record.sender?.name || 'Unknown';
                const preview = type === 'request' 
                    ? (record.message?.raw?.substring(0, 30) + '...')
                    : (record.response?.text?.substring(0, 30) + '...');
                const purpose = getPurpose(record);
                // 用途显示文本
                const purposeText = {
                    'complexity_judge': '复杂判断',
                    'followup_judge': '追问判断',
                    'solver_call': '解题模型',
                    'summarize': '精简',
                    'persona_restate': '复述',
                    'apology': '道歉',
                    'main': '主模型'
                }[purpose] || purpose;
                
                return `
                    <div class="record-item ${type} ${isSelected ? 'active' : ''}" 
                         onclick="selectRecord(${record.id})">
                        <div class="record-header">
                            <span class="record-type type-${type}">${type === 'request' ? '请求' : '响应'}</span>
                            <span class="purpose-tag">${purposeText}</span>
                            <span style="color: #94a3b8; font-size: 0.75rem;">${time}</span>
                        </div>
                        <div class="record-meta">${sender}: ${preview}</div>
                    </div>
                `;
            }).join('');
        }

        function selectRecord(id) {
            if (id === undefined || id === null) return;
            selectedId = Number(id); 
            renderSidebar();
            
            const current = records.find(r => r.id === selectedId);
            if (!current) return;
            
            showDetail(current);
        }

        function showDetail(record) {
            mainContent.innerHTML = '';

            if (record.type === 'request') {
                mainContent.innerHTML += renderRequestDetail(record);
            } else {
                mainContent.innerHTML += renderResponseDetail(record);
            }

            if (record.conversation_id && record.conversation_id !== 'null') {
                const pair = records.find(r => 
                    r.conversation_id === record.conversation_id && 
                    r.id !== record.id
                );
                if (pair) {
                    if (pair.type === 'request') {
                        mainContent.innerHTML += renderRequestDetail(pair);
                    } else {
                        mainContent.innerHTML += renderResponseDetail(pair);
                    }
                } else {
                    mainContent.innerHTML += `
                        <div class="detail-panel" style="opacity: 0.7;">
                            <h3>⏳ 等待配对记录...</h3>
                            <div style="color: #94a3b8;">暂无对应的 ${record.type === 'request' ? '响应' : '请求'}</div>
                        </div>
                    `;
                }
            } else if (!record.conversation_id) {
                mainContent.innerHTML += `
                    <div class="detail-panel" style="opacity: 0.7;">
                        <h3>⚠️ 无法关联对话</h3>
                        <div style="color: #94a3b8;">该记录没有有效的 conversation_id，无法显示配对信息</div>
                    </div>
                `;
            }
        }

        function renderRequestDetail(request) {
            return `
                <div class="detail-panel">
                    <h3>📤 LLM 请求详情 ${request.source?.purpose ? `(${request.source.purpose})` : ''}</h3>
                    <div style="margin-bottom: 1rem;">
                        <strong style="color: #60a5fa;">发送者:</strong> 
                        ${request.sender.name} (${request.sender.id})
                    </div>
                    <div style="margin-bottom: 1rem;">
                        <strong style="color: #60a5fa;">平台:</strong> 
                        ${request.sender.platform} 
                        ${request.sender.group_id ? `| 群组: ${request.sender.group_id}` : ''}
                    </div>
                    <div style="margin-bottom: 1rem;">
                        <strong style="color: #60a5fa;">原始消息:</strong>
                        <div style="background: #334155; padding: 0.75rem; border-radius: 6px; margin-top: 0.5rem;">
                            ${escapeHtml(request.message.raw)}
                        </div>
                    </div>
                    <div style="margin-bottom: 1rem;">
                        <strong style="color: #60a5fa;">格式化 Prompt:</strong>
                        <div style="background: #334155; padding: 0.75rem; border-radius: 6px; margin-top: 0.5rem; font-family: monospace;">
                            ${escapeHtml(request.message.formatted_prompt)}
                        </div>
                    </div>
                    <div style="margin-bottom: 1rem;">
                        <strong style="color: #60a5fa;">模型:</strong> ${request.llm_config.model}
                    </div>
                    <div style="margin-bottom: 1rem;">
                        <strong style="color: #60a5fa;">上下文轮数:</strong> ${request.llm_config.contexts_count}
                    </div>
                    ${request.llm_config.contexts && request.llm_config.contexts.length > 0 ? `
                    <div style="margin-bottom: 1rem;">
                        <strong style="color: #60a5fa;">上下文历史:</strong>
                        <div class="json-viewer">${syntaxHighlight(JSON.stringify(request.llm_config.contexts, null, 2))}</div>
                    </div>
                    ` : ''}
                    <div>
                        <strong style="color: #60a5fa;">System Prompt:</strong>
                        <div class="json-viewer">${escapeHtml(request.llm_config.system_prompt || '')}</div>
                    </div>
                    ${request.tools && request.tools.length > 0 ? `
                    <div style="margin-top: 1rem;">
                        <strong style="color: #60a5fa;">可用工具:</strong>
                        <div class="json-viewer">${syntaxHighlight(JSON.stringify(request.tools, null, 2))}</div>
                    </div>
                    ` : ''}
                </div>
            `;
        }

        function renderResponseDetail(response) {
            return `
                <div class="detail-panel">
                    <h3>📥 LLM 响应详情 ${response.source?.purpose ? `(${response.source.purpose})` : ''}</h3>
                    <div style="margin-bottom: 1rem;">
                        <strong style="color: #60a5fa;">模型:</strong> ${response.response.model || 'Unknown'}
                    </div>
                    <div style="margin-bottom: 1rem;">
                        <strong style="color: #60a5fa;">回复内容:</strong>
                        <div style="background: #065f46; padding: 0.75rem; border-radius: 6px; margin-top: 0.5rem; border-left: 3px solid #10b981;">
                            ${escapeHtml(response.response.text)}
                        </div>
                    </div>
                    ${response.usage ? `
                    <div style="margin-bottom: 1rem;">
                        <strong style="color: #60a5fa;">Token 用量:</strong>
                        <div class="json-viewer">${syntaxHighlight(JSON.stringify(response.usage, null, 2))}</div>
                    </div>
                    ` : ''}
                    ${response.response.raw ? `
                    <div>
                        <strong style="color: #60a5fa;">原始响应:</strong>
                        <div class="json-viewer">${syntaxHighlight(JSON.stringify(response.response.raw, null, 2))}</div>
                    </div>
                    ` : ''}
                </div>
            `;
        }

        function syntaxHighlight(json) {
            json = json.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            return json.replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, function (match) {
                let cls = 'number';
                if (/^"/.test(match)) {
                    if (/:$/.test(match)) {
                        cls = 'key';
                    } else {
                        cls = 'string';
                    }
                } else if (/true|false/.test(match)) {
                    cls = 'boolean';
                } else if (/null/.test(match)) {
                    cls = 'null';
                }
                return '<span class="' + cls + '">' + match + '</span>';
            });
        }

        function escapeHtml(text) {
            if (!text) return '';
            return String(text)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        // 启动
        connect();
    </script>
</body>
</html>
