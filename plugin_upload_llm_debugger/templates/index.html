<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLM Debugger - AstrBot</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            height: 100vh;
            overflow: hidden;
        }
        .header {
            background: #1e293b;
            padding: 1rem 2rem;
            border-bottom: 1px solid #334155;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 { font-size: 1.25rem; color: #60a5fa; }
        .header-nav {
            display: flex;
            gap: 1rem;
        }
        .nav-btn {
            background: transparent;
            border: 1px solid #475569;
            color: #94a3b8;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.875rem;
        }
        .nav-btn:hover {
            background: #334155;
            color: #e2e8f0;
        }
        .nav-btn.active {
            background: #3b82f6;
            border-color: #3b82f6;
            color: white;
        }
        .status {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.875rem;
        }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #10b981;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .container {
            display: grid;
            grid-template-columns: 350px 1fr;
            height: calc(100vh - 60px);
        }
        .container.full-width {
            grid-template-columns: 1fr;
        }
        .sidebar {
            background: #1e293b;
            border-right: 1px solid #334155;
            overflow-y: auto;
            padding: 1rem;
        }
        .filter-bar {
            margin-bottom: 1rem;
            padding: 0.5rem;
            background: #0f172a;
            border-radius: 8px;
        }
        .filter-bar select {
            width: 100%;
            padding: 0.5rem;
            background: #334155;
            color: #e2e8f0;
            border: 1px solid #475569;
            border-radius: 6px;
            font-size: 0.875rem;
            cursor: pointer;
        }
        .record-item {
            background: #334155;
            border-radius: 8px;
            padding: 0.75rem;
            margin-bottom: 0.5rem;
            cursor: pointer;
            transition: all 0.2s;
            border-left: 3px solid transparent;
        }
        .record-item:hover { background: #475569; }
        .record-item.active { 
            background: #2563eb; 
            border-left-color: #60a5fa;
        }
        .record-item.request { border-left-color: #3b82f6; }
        .record-item.response { border-left-color: #10b981; }
        .record-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.25rem;
            font-size: 0.875rem;
            flex-wrap: wrap;
            gap: 0.25rem;
        }
        .record-type {
            padding: 0.125rem 0.5rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .type-request { background: #3b82f6; color: white; }
        .type-response { background: #10b981; color: white; }
        .purpose-tag {
            font-size: 0.7rem;
            padding: 0.125rem 0.4rem;
            border-radius: 12px;
            background: #475569;
            color: #cbd5e1;
            border: 1px solid #64748b;
            white-space: nowrap;
        }
        .record-meta {
            font-size: 0.75rem;
            color: #94a3b8;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .main-content {
            padding: 2rem;
            overflow-y: auto;
            background: #0f172a;
        }
        .detail-panel {
            background: #1e293b;
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1rem;
        }
        .detail-panel h3 {
            color: #60a5fa;
            margin-bottom: 1rem;
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* 可折叠JSON查看器 */
        .json-viewer {
            background: #020617;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 1rem;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 0.875rem;
            line-height: 1.6;
            overflow-x: auto;
            max-height: 600px;
            overflow-y: auto;
        }

        .json-toggle {
            display: inline-flex;
            width: 1rem;
            height: 1rem;
            cursor: pointer;
            align-items: center;
            justify-content: center;
            color: #64748b;
            font-size: 0.75rem;
            margin-right: 0.25rem;
            user-select: none;
        }

        .json-toggle:hover { color: #e2e8f0; }
        .json-toggle.collapsed::before { content: "▶"; }
        .json-toggle.expanded::before { content: "▼"; }
        .json-toggle.leaf::before { content: ""; }

        .json-content.collapsed { display: none; }

        .json-line {
            display: flex;
            flex-wrap: wrap;
            align-items: flex-start;
            min-height: 1.5rem;
            margin-left: 1.5rem;
        }

        .json-collapsed-preview {
            color: #64748b;
            font-style: italic;
            margin-left: 0.25rem;
        }

        .json-key { color: #93c5fd; margin-right: 0.5rem; }
        .json-string { color: #a5f3fc; }
        .json-number { color: #fca5a5; }
        .json-boolean { color: #fdba74; }
        .json-null { color: #94a3b8; }
        .json-bracket { color: #64748b; }

        /* 可折叠区块 */
        .collapsible-section {
            border: 1px solid #334155;
            border-radius: 8px;
            margin-bottom: 1rem;
            overflow: hidden;
        }

        .collapsible-header {
            background: #0f172a;
            padding: 0.75rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            user-select: none;
            transition: background 0.2s;
        }

        .collapsible-header:hover { background: #1e293b; }
        .collapsible-header.collapsed .collapsible-icon { transform: rotate(-90deg); }

        .collapsible-title {
            font-weight: 600;
            color: #60a5fa;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .collapsible-icon {
            transition: transform 0.3s;
            color: #64748b;
        }

        .collapsible-content {
            padding: 1rem;
            background: #1e293b;
            max-height: 500px;
            overflow-y: auto;
            transition: max-height 0.3s ease-out;
        }

        .collapsible-content.collapsed {
            max-height: 0;
            padding: 0 1rem;
            overflow: hidden;
        }

        /* 长文本折叠 */
        .text-preview {
            max-height: 100px;
            overflow: hidden;
            position: relative;
            background: #334155;
            padding: 0.75rem;
            border-radius: 6px;
            border-left: 3px solid #3b82f6;
        }

        .text-preview.expanded { max-height: none; }

        .text-fade {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 30px;
            background: linear-gradient(transparent, #334155);
            pointer-events: none;
        }

        .text-preview.expanded .text-fade { display: none; }

        .expand-text-btn {
            margin-top: 0.5rem;
            color: #60a5fa;
            cursor: pointer;
            font-size: 0.75rem;
            display: inline-block;
        }

        .expand-text-btn:hover { text-decoration: underline; }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #64748b;
        }
        .connection-lost {
            position: fixed;
            top: 60px;
            right: 20px;
            background: #ef4444;
            color: white;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            display: none;
        }

        /* MoreChatPlus 数据查看样式 */
        .mcp-section {
            display: none;
        }
        .mcp-section.active {
            display: block;
        }
        .mcp-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .stat-card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 1.5rem;
            text-align: center;
        }
        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            color: #60a5fa;
            margin-bottom: 0.5rem;
        }
        .stat-label {
            font-size: 0.875rem;
            color: #94a3b8;
        }
        .mcp-controls {
            background: #1e293b;
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 1rem;
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            align-items: center;
        }
        .mcp-controls select, .mcp-controls button {
            padding: 0.5rem 1rem;
            background: #334155;
            border: 1px solid #475569;
            color: #e2e8f0;
            border-radius: 6px;
            cursor: pointer;
        }
        .mcp-controls button {
            background: #3b82f6;
            border-color: #3b82f6;
        }
        .mcp-controls button:hover {
            background: #2563eb;
        }
        .data-table {
            width: 100%;
            border-collapse: collapse;
            background: #1e293b;
            border-radius: 8px;
            overflow: hidden;
        }
        .data-table th, .data-table td {
            padding: 0.75rem;
            text-align: left;
            border-bottom: 1px solid #334155;
            font-size: 0.875rem;
        }
        .data-table th {
            background: #0f172a;
            color: #60a5fa;
            font-weight: 600;
        }
        .data-table tr:hover {
            background: #334155;
        }
        .tab-buttons {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }
        .tab-btn {
            padding: 0.5rem 1rem;
            background: #334155;
            border: 1px solid #475569;
            color: #94a3b8;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.875rem;
        }
        .tab-btn.active {
            background: #3b82f6;
            color: white;
            border-color: #3b82f6;
        }
        .pagination {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
            justify-content: center;
        }
        .pagination button {
            padding: 0.5rem 1rem;
            background: #334155;
            border: 1px solid #475569;
            color: #e2e8f0;
            border-radius: 6px;
            cursor: pointer;
        }
        .pagination button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .loading {
            text-align: center;
            padding: 2rem;
            color: #94a3b8;
        }

        /* 新增：抓包监控专用样式 */
        .capture-section { display: none; }
        .capture-section.active { display: block; }

        .capture-grid {
            display: grid;
            grid-template-columns: 400px 1fr;
            height: calc(100vh - 60px);
            gap: 0;
        }

        .capture-sidebar {
            background: #1e293b;
            border-right: 1px solid #334155;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .capture-toolbar {
            padding: 1rem;
            border-bottom: 1px solid #334155;
            background: #0f172a;
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .capture-btn {
            padding: 0.5rem 1rem;
            background: #3b82f6;
            border: none;
            color: white;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.875rem;
        }

        .capture-btn:hover { background: #2563eb; }

        .capture-btn.secondary {
            background: #475569;
        }

        .capture-btn.secondary:hover {
            background: #334155;
        }

        .phase-badge {
            display: inline-block;
            padding: 0.125rem 0.5rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .phase-request { background: #f59e0b; color: #0f172a; }
        .phase-response { background: #10b981; color: white; }

        .capture-list {
            overflow-y: auto;
            padding: 0.5rem;
        }

        .capture-item {
            background: #334155;
            border-radius: 8px;
            padding: 0.75rem;
            margin-bottom: 0.5rem;
            cursor: pointer;
            transition: all 0.2s;
            border-left: 3px solid transparent;
        }

        .capture-item:hover { background: #475569; }
        .capture-item.active { 
            background: #2563eb; 
            border-left-color: #60a5fa;
        }
        .capture-item.request { border-left-color: #f59e0b; }
        .capture-item.response { border-left-color: #10b981; }

        .capture-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }

        .capture-meta {
            font-size: 0.75rem;
            color: #94a3b8;
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .capture-preview {
            font-size: 0.875rem;
            color: #cbd5e1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-family: monospace;
        }

        .capture-detail {
            background: #0f172a;
            overflow-y: auto;
            padding: 1.5rem;
        }

        .detail-card {
            background: #1e293b;
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1rem;
            border: 1px solid #334155;
        }

        .detail-card h4 {
            color: #60a5fa;
            margin-bottom: 1rem;
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .raw-json {
            background: #020617;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 1rem;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 0.8rem;
            line-height: 1.6;
            overflow-x: auto;
            max-height: 500px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-all;
            color: #e2e8f0;
        }

        .prompt-box {
            background: #1e293b;
            border-left: 3px solid #f59e0b;
            padding: 1rem;
            border-radius: 0 8px 8px 0;
            margin: 0.5rem 0;
            white-space: pre-wrap;
            word-break: break-word;
            font-family: monospace;
            font-size: 0.875rem;
            line-height: 1.6;
            max-height: 400px;
            overflow-y: auto;
        }

        .system-prompt-box {
            border-left-color: #ec4899;
            background: #1e293b;
        }

        .context-list {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .context-item {
            background: #334155;
            padding: 0.75rem;
            border-radius: 6px;
            border-left: 2px solid #64748b;
        }

        .context-role {
            font-size: 0.75rem;
            color: #60a5fa;
            font-weight: 600;
            margin-bottom: 0.25rem;
            text-transform: uppercase;
        }

        .context-content {
            font-size: 0.875rem;
            color: #e2e8f0;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .stat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .stat-box {
            background: #334155;
            padding: 1rem;
            border-radius: 8px;
            text-align: center;
        }

        .stat-num {
            font-size: 1.5rem;
            font-weight: bold;
            color: #60a5fa;
        }

        .stat-desc {
            font-size: 0.75rem;
            color: #94a3b8;
            margin-top: 0.25rem;
        }
    </style>
    <base target="_blank">
<base target="_blank">
</head>
<body>
    <div class="header">
        <h1>🔍 LLM Debugger</h1>
        <div class="header-nav">
            <button class="nav-btn active" onclick="showTab('debugger')">调试器</button>
            <button class="nav-btn" onclick="showTab('morechatplus')">MoreChatPlus数据</button>
            <!-- 新增：抓包监控按钮 -->
            <button class="nav-btn" onclick="showTab('capture')">抓包监控</button>
        </div>
        <div class="status">
            <div class="status-dot" id="ws-status"></div>
            <span id="conn-status">已连接</span>
            <span id="record-count" style="margin-left: 1rem; color: #94a3b8;">0 条记录</span>
        </div>
    </div>

    <div class="connection-lost" id="error-toast">连接断开，正在重连...</div>

    <!-- 调试器界面 -->
    <div id="debugger-section" class="mcp-section active">
        <div class="container">
            <div class="sidebar" id="sidebar">
                <div class="filter-bar">
                    <select id="purpose-filter">
                        <option value="all">全部记录</option>
                        <option value="complexity_judge">复杂判断</option>
                        <option value="followup_judge">追问判断</option>
                        <option value="solver_call">解题模型</option>
                        <option value="summarize">精简输出</option>
                        <option value="persona_restate">人设复述</option>
                        <option value="apology">道歉消息</option>
                        <option value="model_a_summary">模型A总结</option>
                        <option value="model_b_profile">模型B画像</option>
                        <option value="vision">识图</option>
                        <option value="nickname_check">昵称检查</option>
                        <option value="main">主模型（其他）</option>
                    </select>
                </div>
                <div id="record-list"></div>
            </div>

            <div class="main-content" id="main-content">
                <div class="empty-state">
                    <div style="font-size: 3rem; margin-bottom: 1rem;">📭</div>
                    <div>选择左侧记录查看详情</div>
                </div>
            </div>
        </div>
    </div>

    <!-- MoreChatPlus 数据界面 -->
    <div id="morechatplus-section" class="mcp-section">
        <div class="container full-width">
            <div class="main-content">
                <div class="tab-buttons">
                    <button class="tab-btn active" onclick="showMcpTab('stats')">统计概览</button>
                    <button class="tab-btn" onclick="showMcpTab('messages')">消息记录</button>
                    <button class="tab-btn" onclick="showMcpTab('profiles')">用户画像</button>
                    <button class="tab-btn" onclick="showMcpTab('summaries')">上下文总结</button>
                </div>

                <div id="mcp-stats" class="mcp-tab-content active">
                    <div class="mcp-stats" id="stats-container">
                        <div class="stat-card">
                            <div class="stat-value" id="stat-messages">-</div>
                            <div class="stat-label">总消息数</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value" id="stat-profiles">-</div>
                            <div class="stat-label">用户画像数</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value" id="stat-summaries">-</div>
                            <div class="stat-label">总结记录数</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value" id="stat-origins">-</div>
                            <div class="stat-label">群聊数量</div>
                        </div>
                    </div>
                </div>

                <div id="mcp-messages" class="mcp-tab-content" style="display:none;">
                    <div class="mcp-controls">
                        <select id="mcp-origin-select"><option value="">全部来源</option></select>
                        <button onclick="loadMessages()">刷新</button>
                    </div>
                    <div id="messages-container"><div class="loading">加载中...</div></div>
                    <div class="pagination">
                        <button onclick="changePage(-1)" id="msg-prev">上一页</button>
                        <span id="msg-page-info">第 1 页</span>
                        <button onclick="changePage(1)" id="msg-next">下一页</button>
                    </div>
                </div>

                <div id="mcp-profiles" class="mcp-tab-content" style="display:none;">
                    <div class="mcp-controls">
                        <select id="profile-origin-select"><option value="">全部来源</option></select>
                        <button onclick="loadProfiles()">刷新</button>
                    </div>
                    <div id="profiles-container"><div class="loading">加载中...</div></div>
                </div>

                <div id="mcp-summaries" class="mcp-tab-content" style="display:none;">
                    <div class="mcp-controls">
                        <select id="summary-origin-select"><option value="">全部来源</option></select>
                        <button onclick="loadSummaries()">刷新</button>
                    </div>
                    <div id="summaries-container"><div class="loading">加载中...</div></div>
                </div>
            </div>
        </div>
    </div>

    <!-- 新增：抓包监控界面 -->
    <div id="capture-section" class="capture-section">
        <div class="capture-grid">
            <div class="capture-sidebar">
                <div class="capture-toolbar">
                    <button class="capture-btn" onclick="clearCaptureData()">🗑️ 清空数据</button>
                    <button class="capture-btn secondary" onclick="exportCaptureData()">📥 导出JSON</button>
                    <select id="capture-filter" onchange="filterCapture()" style="padding: 0.5rem; background: #334155; color: #e2e8f0; border: 1px solid #475569; border-radius: 6px;">
                        <option value="all">全部</option>
                        <option value="request">仅请求</option>
                        <option value="response">仅响应</option>
                    </select>
                </div>
                <div class="capture-list" id="capture-list">
                    <div style="color: #64748b; text-align: center; padding: 2rem;">等待抓包数据...</div>
                </div>
            </div>
            <div class="capture-detail" id="capture-detail">
                <div class="empty-state">
                    <div style="font-size: 3rem; margin-bottom: 1rem;">📦</div>
                    <div>选择左侧抓包记录查看完整请求结构</div>
                    <div style="font-size: 0.875rem; color: #64748b; margin-top: 0.5rem;">
                        这里显示经过所有插件处理后的最终LLM请求数据
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>

        // ===== 调试器核心功能 =====
        let ws, records = [], selectedId = null, currentFilter = 'all';
        const mcpPageSize = 20;
        let mcpPage = 0, mcpOrigins = [];

        function connect() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${protocol}//${window.location.host}/ws`);

            ws.onopen = () => {
                document.getElementById('conn-status').textContent = '已连接';
                document.getElementById('conn-status').style.color = '#10b981';
                document.getElementById('error-toast').style.display = 'none';
            };

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                records.unshift(data);
                if (records.length > 200) records.pop();
                renderSidebar();
                document.getElementById('record-count').textContent = `${records.length} 条记录`;

                if (selectedId) {
                    const selectedRecord = records.find(r => r.id === selectedId);
                    if (selectedRecord && data.conversation_id === selectedRecord.conversation_id) {
                        showDetail(selectedRecord);
                    }
                }
            };

            ws.onclose = () => {
                document.getElementById('conn-status').textContent = '断开';
                document.getElementById('conn-status').style.color = '#ef4444';
                document.getElementById('error-toast').style.display = 'block';
                setTimeout(connect, 3000);
            };

            ws.onerror = () => {
                document.getElementById('conn-status').textContent = '错误';
                document.getElementById('conn-status').style.color = '#ef4444';
            };
        }

        function getPurpose(record) {
            return record.source?.purpose || 'main';
        }

        function renderSidebar() {
            const filtered = records.filter(r => currentFilter === 'all' || getPurpose(r) === currentFilter);
            const listEl = document.getElementById('record-list');

            if (filtered.length === 0) {
                listEl.innerHTML = '<div style="color: #64748b; text-align: center; padding: 2rem;">没有符合条件的记录</div>';
                return;
            }

            const purposeMap = {
                'complexity_judge': '复杂判断', 'followup_judge': '追问判断', 'solver_call': '解题模型',
                'summarize': '精简', 'persona_restate': '复述', 'apology': '道歉',
                'model_a_summary': '模型A总结', 'model_b_profile': '模型B画像',
                'vision': '识图', 'nickname_check': '昵称检查', 'main': '主模型'
            };

            listEl.innerHTML = filtered.map(record => {
                const isSelected = record.id === selectedId;
                const type = record.type;
                const time = new Date(record.timestamp).toLocaleTimeString();
                const sender = record.sender?.name || 'Unknown';
                const preview = type === 'request' 
                    ? (record.message?.raw?.substring(0, 30) + '...')
                    : (record.response?.text?.substring(0, 30) + '...');
                const purposeText = purposeMap[getPurpose(record)] || getPurpose(record);

                return `<div class="record-item ${type} ${isSelected ? 'active' : ''}" onclick="selectRecord(${record.id})">
                    <div class="record-header">
                        <span class="record-type type-${type}">${type === 'request' ? '请求' : '响应'}</span>
                        <span class="purpose-tag">${purposeText}</span>
                        <span style="color: #94a3b8; font-size: 0.75rem;">${time}</span>
                    </div>
                    <div class="record-meta">${sender}: ${preview}</div>
                </div>`;
            }).join('');
        }

        function selectRecord(id) {
            if (id == null) return;
            selectedId = Number(id);
            renderSidebar();
            const current = records.find(r => r.id === selectedId);
            if (current) showDetail(current);
        }

        function showDetail(record) {
            const mainContent = document.getElementById('main-content');
            mainContent.innerHTML = '';

            if (record.type === 'request') {
                mainContent.innerHTML += renderRequestDetail(record);
            } else {
                mainContent.innerHTML += renderResponseDetail(record);
            }

            if (record.conversation_id && record.conversation_id !== 'null') {
                const pair = records.find(r => r.conversation_id === record.conversation_id && r.id !== record.id);
                if (pair) {
                    mainContent.innerHTML += pair.type === 'request' ? renderRequestDetail(pair) : renderResponseDetail(pair);
                } else {
                    mainContent.innerHTML += `<div class="detail-panel" style="opacity: 0.7;">
                        <h3>⏳ 等待配对记录...</h3>
                        <div style="color: #94a3b8;">暂无对应的 ${record.type === 'request' ? '响应' : '请求'}</div>
                    </div>`;
                }
            }
        }

        // ===== 可折叠渲染函数 =====
        function renderJsonTree(obj, level = 0) {
            if (obj === null) return '<span class="json-null">null</span>';
            if (obj === undefined) return '<span class="json-null">undefined</span>';

            const type = typeof obj;

            if (type === 'string') {
                const display = obj.length > 100 ? escapeHtml(obj.substring(0, 100)) + '...' : escapeHtml(obj);
                return `<span class="json-string">"${display}"${obj.length > 100 ? ` <span style="color: #64748b;">(${obj.length} 字符)</span>` : ''}</span>`;
            }
            if (type === 'number') return `<span class="json-number">${obj}</span>`;
            if (type === 'boolean') return `<span class="json-boolean">${obj}</span>`;

            if (Array.isArray(obj)) {
                if (obj.length === 0) return '<span class="json-bracket">[]</span>';
                const id = 'json-' + Math.random().toString(36).substr(2, 9);
                const isLarge = obj.length > 3 || level > 2;

                let html = `<span class="json-toggle ${isLarge ? 'collapsed' : 'expanded'}" onclick="toggleJsonNode(event, '${id}')"></span>`;
                html += `<span class="json-bracket">[</span>`;
                html += `<span class="json-collapsed-preview" id="${id}-preview"> ${obj.length} 项</span>`;
                html += `<div class="json-content ${isLarge ? 'collapsed' : ''}" id="${id}">`;

                obj.forEach((item, index) => {
                    html += `<div class="json-line">${renderJsonTree(item, level + 1)}${index < obj.length - 1 ? '<span class="json-bracket">,</span>' : ''}</div>`;
                });

                html += '</div><span class="json-bracket">]</span>';
                return html;
            }

            if (type === 'object') {
                const keys = Object.keys(obj);
                if (keys.length === 0) return '<span class="json-bracket">{}</span>';

                const id = 'json-' + Math.random().toString(36).substr(2, 9);
                const isLarge = keys.length > 3 || level > 1;

                let html = `<span class="json-toggle ${isLarge ? 'collapsed' : 'expanded'}" onclick="toggleJsonNode(event, '${id}')"></span>`;
                html += `<span class="json-bracket">{</span>`;
                html += `<span class="json-collapsed-preview" id="${id}-preview"> ${keys.length} 个属性</span>`;
                html += `<div class="json-content ${isLarge ? 'collapsed' : ''}" id="${id}">`;

                keys.forEach((k, index) => {
                    html += `<div class="json-line"><span class="json-key">"${escapeHtml(k)}"</span>: ${renderJsonTree(obj[k], level + 1)}${index < keys.length - 1 ? '<span class="json-bracket">,</span>' : ''}</div>`;
                });

                html += '</div><span class="json-bracket">}</span>';
                return html;
            }

            return escapeHtml(String(obj));
        }

        function toggleJsonNode(event, id) {
            event.stopPropagation();
            const content = document.getElementById(id);
            const preview = document.getElementById(id + '-preview');
            const toggle = event.target;

            if (content.classList.contains('collapsed')) {
                content.classList.remove('collapsed');
                preview.style.display = 'none';
                toggle.classList.remove('collapsed');
                toggle.classList.add('expanded');
            } else {
                content.classList.add('collapsed');
                preview.style.display = 'inline';
                toggle.classList.remove('expanded');
                toggle.classList.add('collapsed');
            }
        }

        function renderCollapsibleSection(title, content, defaultCollapsed) {
            const id = 'section-' + Math.random().toString(36).substr(2, 9);
            return `<div class="collapsible-section">
                <div class="collapsible-header ${defaultCollapsed ? 'collapsed' : ''}" onclick="toggleSection('${id}')">
                    <span class="collapsible-title">
                        <span class="collapsible-icon">▼</span>
                        ${title}
                    </span>
                    <span style="color: #64748b; font-size: 0.75rem;">点击${defaultCollapsed ? '展开' : '折叠'}</span>
                </div>
                <div class="collapsible-content ${defaultCollapsed ? 'collapsed' : ''}" id="${id}">${content}</div>
            </div>`;
        }

        function renderCollapsibleText(text, label, maxLength = 100, type = 'normal') {
            if (!text) return '<div style="color: #64748b;">(空)</div>';

            const isLong = text.length > maxLength;
            if (!isLong) {
                const bgColor = type === 'response' ? '#065f46' : '#334155';
                const borderColor = type === 'response' ? '#10b981' : '#3b82f6';
                return `<div style="background: ${bgColor}; padding: 0.75rem; border-radius: 6px; border-left: 3px solid ${borderColor}; white-space: pre-wrap; word-break: break-word;">${escapeHtml(text)}</div>`;
            }

            const id = 'text-' + Math.random().toString(36).substr(2, 9);
            return `<div class="text-preview" id="${id}"><div>${escapeHtml(text)}</div><div class="text-fade"></div></div>
                <span class="expand-text-btn" onclick="toggleTextExpand('${id}', this)">展开全部 (${text.length} 字符)</span>`;
        }

        function toggleSection(id) {
            const content = document.getElementById(id);
            const header = content.previousElementSibling;
            const isCollapsed = content.classList.contains('collapsed');

            if (isCollapsed) {
                content.classList.remove('collapsed');
                header.classList.remove('collapsed');
            } else {
                content.classList.add('collapsed');
                header.classList.add('collapsed');
            }
        }

        function toggleTextExpand(id, btn) {
            const preview = document.getElementById(id);
            const isExpanded = preview.classList.contains('expanded');

            if (isExpanded) {
                preview.classList.remove('expanded');
                btn.textContent = btn.textContent.replace('收起', '展开全部');
            } else {
                preview.classList.add('expanded');
                btn.textContent = btn.textContent.replace('展开全部', '收起');
            }
        }

        function escapeHtml(text) {
            if (!text) return '';
            return String(text)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        // ===== 详情渲染 =====
        function renderRequestDetail(request) {
            const purpose = request.source?.purpose || 'main';
            const contexts = request.llm_config?.contexts || [];
            const hasLargeContexts = contexts.length > 5;
            const systemPrompt = request.llm_config?.system_prompt || '';
            const hasLongSystemPrompt = systemPrompt.length > 200;

            let html = `<div class="detail-panel">
                <h3>📤 LLM 请求详情 (${purpose})</h3>
                <div style="margin-bottom: 1rem;"><strong style="color: #60a5fa;">发送者:</strong> ${request.sender.name} (${request.sender.id})</div>
                <div style="margin-bottom: 1rem;"><strong style="color: #60a5fa;">平台:</strong> ${request.sender.platform} ${request.sender.group_id ? `| 群组: ${request.sender.group_id}` : ''}</div>
                <div style="margin-bottom: 1rem;"><strong style="color: #60a5fa;">原始消息:</strong> ${renderCollapsibleText(request.message?.raw || '', '原始消息')}</div>
                <div style="margin-bottom: 1rem;"><strong style="color: #60a5fa;">格式化 Prompt:</strong> ${renderCollapsibleText(request.message?.formatted_prompt || '', 'Prompt', 150)}</div>
                <div style="margin-bottom: 1rem;"><strong style="color: #60a5fa;">模型:</strong> ${request.llm_config.model}</div>
                <div style="margin-bottom: 1rem;"><strong style="color: #60a5fa;">上下文轮数:</strong> ${contexts.length}</div>`;

            if (contexts.length > 0) {
                html += renderCollapsibleSection('上下文历史', '<div class="json-viewer">' + renderJsonTree(contexts) + '</div>', hasLargeContexts);
            }

            if (systemPrompt) {
                html += renderCollapsibleSection('System Prompt', renderCollapsibleText(systemPrompt, '', 200), hasLongSystemPrompt);
            }

            if (request.message?.image_urls?.length > 0) {
                html += `<div><strong style="color: #60a5fa;">图片URL:</strong><div class="json-viewer">${request.message.image_urls.map(url => escapeHtml(url)).join('<br>')}</div></div>`;
            }

            html += '</div>';
            return html;
        }

        function renderResponseDetail(response) {
            const purpose = response.source?.purpose || 'main';
            const raw = response.response?.raw;
            const hasRaw = raw && (typeof raw === 'object' ? Object.keys(raw).length > 0 : String(raw).length > 0);

            let html = `<div class="detail-panel">
                <h3>📥 LLM 响应详情 (${purpose})</h3>
                <div style="margin-bottom: 1rem;"><strong style="color: #60a5fa;">模型:</strong> ${response.response.model || 'Unknown'}</div>
                <div style="margin-bottom: 1rem;"><strong style="color: #60a5fa;">回复内容:</strong> ${renderCollapsibleText(response.response.text || '', '回复内容', 200, 'response')}</div>`;

            if (response.usage) {
                html += renderCollapsibleSection('Token 用量', '<div class="json-viewer">' + renderJsonTree(response.usage) + '</div>', false);
            }

            if (hasRaw) {
                html += renderCollapsibleSection('原始响应', '<div class="json-viewer">' + renderJsonTree(raw) + '</div>', true);
            }

            html += '</div>';
            return html;
        }

        // ===== MoreChatPlus 数据功能 =====
        function showMcpTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            document.querySelectorAll('.mcp-tab-content').forEach(el => el.style.display = 'none');
            document.getElementById('mcp-' + tab).style.display = 'block';

            if (tab === 'stats') loadMcpStats();
            else if (tab === 'messages') loadMessages();
            else if (tab === 'profiles') loadProfiles();
            else if (tab === 'summaries') loadSummaries();
        }

        async function loadMcpStats() {
            try {
                const res = await fetch('/api/morechatplus/stats');
                const data = await res.json();
                if (data.error) return;
                document.getElementById('stat-messages').textContent = data.total_messages || 0;
                document.getElementById('stat-profiles').textContent = data.total_profiles || 0;
                document.getElementById('stat-summaries').textContent = data.total_summaries || 0;
                document.getElementById('stat-origins').textContent = data.total_origins || 0;
            } catch (e) {
                console.error('加载统计失败:', e);
            }
        }

        async function loadMcpOrigins() {
            try {
                const res = await fetch('/api/morechatplus/origins');
                const data = await res.json();
                mcpOrigins = data.origins || [];
                ['mcp-origin-select', 'profile-origin-select', 'summary-origin-select'].forEach(id => {
                    const select = document.getElementById(id);
                    select.innerHTML = '<option value="">全部来源</option>';
                    mcpOrigins.forEach(origin => {
                        const option = document.createElement('option');
                        option.value = origin;
                        option.textContent = origin;
                        select.appendChild(option);
                    });
                });
            } catch (e) {
                console.error('加载来源失败:', e);
            }
        }

        async function loadMessages() {
            const container = document.getElementById('messages-container');
            container.innerHTML = '<div class="loading">加载中...</div>';
            const origin = document.getElementById('mcp-origin-select').value;

            try {
                const res = await fetch(`/api/morechatplus/messages?limit=${mcpPageSize}&offset=${mcpPage * mcpPageSize}&origin=${origin}`);
                const data = await res.json();

                if (data.error) {
                    container.innerHTML = `<div style="color: #ef4444;">错误: ${data.error}</div>`;
                    return;
                }

                if (data.messages.length === 0) {
                    container.innerHTML = '<div style="text-align: center; color: #64748b;">暂无数据</div>';
                    return;
                }

                let html = '<table class="data-table"><thead><tr><th>ID</th><th>时间</th><th>来源</th><th>用户</th><th>昵称</th><th>内容</th></tr></thead><tbody>';
                data.messages.forEach(msg => {
                    const time = new Date(msg.timestamp * 1000).toLocaleString();
                    const content = escapeHtml(msg.content || '').substring(0, 100);
                    html += `<tr><td>${msg.id}</td><td>${time}</td><td>${escapeHtml(msg.origin || '')}</td><td>${msg.user_id}</td><td>${escapeHtml(msg.nickname || '')}</td><td>${content}${msg.content?.length > 100 ? '...' : ''}</td></tr>`;
                });
                html += '</tbody></table>';
                container.innerHTML = html;

                document.getElementById('msg-page-info').textContent = `第 ${mcpPage + 1} 页`;
                document.getElementById('msg-prev').disabled = mcpPage === 0;
                document.getElementById('msg-next').disabled = data.messages.length < mcpPageSize;
            } catch (e) {
                container.innerHTML = `<div style="color: #ef4444;">加载失败: ${e.message}</div>`;
            }
        }

        async function loadProfiles() {
            const container = document.getElementById('profiles-container');
            container.innerHTML = '<div class="loading">加载中...</div>';
            const origin = document.getElementById('profile-origin-select').value;

            try {
                const res = await fetch(`/api/morechatplus/profiles?origin=${origin}`);
                const data = await res.json();

                if (data.error || data.profiles.length === 0) {
                    container.innerHTML = `<div style="text-align: center; color: #64748b;">${data.error || '暂无数据'}</div>`;
                    return;
                }

                let html = '<table class="data-table"><thead><tr><th>用户ID</th><th>来源</th><th>昵称</th><th>性格</th><th>兴趣</th><th>关系</th></tr></thead><tbody>';
                data.profiles.forEach(profile => {
                    const nicknames = JSON.parse(profile.nicknames || '[]').join(', ');
                    html += `<tr><td>${profile.user_id}</td><td>${escapeHtml(profile.origin || '')}</td><td>${escapeHtml(nicknames)}</td><td>${escapeHtml(profile.personality_traits || '')}</td><td>${escapeHtml(profile.interests || '')}</td><td>${escapeHtml(profile.relationship_with_bot || '')}</td></tr>`;
                });
                html += '</tbody></table>';
                container.innerHTML = html;
            } catch (e) {
                container.innerHTML = `<div style="color: #ef4444;">加载失败: ${e.message}</div>`;
            }
        }

        // 切换总结文本的展开/折叠
        function toggleSummaryText(btn) {
            const container = btn.parentElement;
            const shortSpan = container.querySelector('.text-short');
            const fullSpan = container.querySelector('.text-full');
            const fullText = btn.getAttribute('data-full-text');

            if (fullSpan.style.display === 'none' || fullSpan.style.display === '') {
                // 展开
                if (!fullSpan.innerHTML) {
                    fullSpan.innerHTML = '<br>' + fullText;
                }
                fullSpan.style.display = 'block';
                shortSpan.style.display = 'none';
                btn.textContent = '收起';
                btn.classList.add('expanded');
            } else {
                // 折叠
                fullSpan.style.display = 'none';
                shortSpan.style.display = 'inline';
                btn.textContent = '展开';
                btn.classList.remove('expanded');
            }
        }

        async function loadSummaries() {
            const container = document.getElementById('summaries-container');
            container.innerHTML = '<div class="loading">加载中...</div>';
            const origin = document.getElementById('summary-origin-select').value;

            try {
                const res = await fetch(`/api/morechatplus/summaries?origin=${origin}`);
                const data = await res.json();

                if (data.error || data.summaries.length === 0) {
                    container.innerHTML = `<div style="text-align: center; color: #64748b;">${data.error || '暂无数据'}</div>`;
                    return;
                }

                // 添加样式
                let html = `<style>
                    .summary-text { max-width: 300px; font-size: 0.875rem; line-height: 1.4; }
                    .text-short { display: inline; }
                    .text-full { display: none; color: #e2e8f0; margin-top: 0.5rem; padding: 0.75rem; background: #0f172a; border-radius: 6px; border: 1px solid #334155; white-space: pre-wrap; word-break: break-word; max-height: 300px; overflow-y: auto; }
                    .expand-btn { margin-left: 0.5rem; padding: 0.25rem 0.75rem; background: #3b82f6; border: none; color: white; border-radius: 4px; cursor: pointer; font-size: 0.75rem; transition: all 0.2s; }
                    .expand-btn:hover { background: #2563eb; }
                    .expand-btn.expanded { background: #64748b; }
                </style>
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>时间</th>
                            <th>来源</th>
                            <th style="min-width: 250px;">总结</th>
                            <th style="min-width: 250px;">话题分析</th>
                            <th style="min-width: 250px;">建议</th>
                            <th>是否回复</th>
                        </tr>
                    </thead>
                    <tbody>`;

                data.summaries.forEach(summary => {
                    const time = new Date(summary.timestamp * 1000).toLocaleString();

                    // 辅助函数：生成长文本HTML
                    const renderCell = (text) => {
                        if (!text) return '<span style="color: #64748b;">(空)</span>';
                        const escaped = escapeHtml(text);
                        if (escaped.length <= 50) {
                            return `<div class="summary-text"><span class="text-short">${escaped}</span><span class="text-full" style="display:none;"></span></div>`;
                        }
                        const short = escaped.substring(0, 50);
                        // 使用 data 属性存储完整文本，避免引号转义问题
                        return `<div class="summary-text">
                            <span class="text-short">${short}...</span>
                            <span class="text-full" style="display:none;"></span>
                            <button class="expand-btn" data-full-text="${escaped.replace(/"/g, '&quot;')}" onclick="toggleSummaryText(this)">展开</button>
                        </div>`;
                    };

                    html += `<tr>
                        <td>${summary.id}</td>
                        <td>${time}</td>
                        <td>${escapeHtml(summary.origin || '')}</td>
                        <td>${renderCell(summary.summary)}</td>
                        <td>${renderCell(summary.topic_analysis)}</td>
                        <td>${renderCell(summary.suggestions)}</td>
                        <td>${summary.should_reply ? '<span style="color: #10b981; font-weight: bold;">是</span>' : '<span style="color: #64748b;">否</span>'}</td>
                    </tr>`;
                });
                html += '</tbody></table>';
                container.innerHTML = html;
            } catch (e) {
                container.innerHTML = `<div style="color: #ef4444;">加载失败: ${e.message}</div>`;
            }
        }

        function changePage(delta) {
            mcpPage += delta;
            if (mcpPage < 0) mcpPage = 0;
            loadMessages();
        }

        document.getElementById('purpose-filter').addEventListener('change', (e) => {
            currentFilter = e.target.value;
            renderSidebar();
        });


        // ===== 新增：抓包功能JavaScript =====
        let captureWs, captureRecords = [], selectedCaptureId = null;
        let captureFilter = 'all';

        function initCapture() {
            connectCaptureWebSocket();
            loadCaptureHistory();
        }

        function connectCaptureWebSocket() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            captureWs = new WebSocket(`${protocol}//${window.location.host}/ws_capture`);

            captureWs.onopen = () => {
                document.getElementById('ws-status').style.background = '#10b981';
                console.log('[Capture] WebSocket已连接');
            };

            captureWs.onmessage = (event) => {
                const data = JSON.parse(event.data);
                captureRecords.unshift(data);
                if (captureRecords.length > 200) captureRecords.pop();
                renderCaptureList();

                // 如果正在查看相关会话，自动刷新详情
                if (selectedCaptureId && data.conversation_id) {
                    const current = captureRecords.find(r => r.id === selectedCaptureId);
                    if (current && current.conversation_id === data.conversation_id) {
                        showCaptureDetail(current);
                    }
                }
            };

            captureWs.onclose = () => {
                document.getElementById('ws-status').style.background = '#ef4444';
                setTimeout(connectCaptureWebSocket, 3000);
            };
        }

        async function loadCaptureHistory() {
            try {
                const res = await fetch('/api/capture?limit=100');
                const data = await res.json();
                if (Array.isArray(data)) {
                    captureRecords = data;
                    renderCaptureList();
                }
            } catch (e) {
                console.error('加载抓包历史失败:', e);
            }
        }

        function renderCaptureList() {
            const filtered = captureRecords.filter(r => captureFilter === 'all' || r.phase === captureFilter);
            const listEl = document.getElementById('capture-list');

            if (filtered.length === 0) {
                listEl.innerHTML = '<div style="color: #64748b; text-align: center; padding: 2rem;">暂无抓包记录</div>';
                return;
            }

            listEl.innerHTML = filtered.map(record => {
                const isSelected = record.id === selectedCaptureId;
                const time = new Date(record.timestamp).toLocaleTimeString();
                const preview = record.phase === 'request' 
                    ? (record.extracted_prompt?.substring(0, 40) || '无Prompt')
                    : (record.response_text?.substring(0, 40) || '无响应');

                return `<div class="capture-item ${record.phase} ${isSelected ? 'active' : ''}" onclick="selectCapture(${record.id})">
                    <div class="capture-header">
                        <span class="phase-badge phase-${record.phase}">${record.phase === 'request' ? '⬆️ 请求' : '⬇️ 响应'}</span>
                        <span style="font-size: 0.75rem; color: #94a3b8;">${time}</span>
                    </div>
                    <div class="capture-meta">
                        <span>${record.sender?.name || 'Unknown'}</span>
                        <span style="color: #64748b;">${record.model || 'unknown'}</span>
                    </div>
                    <div class="capture-preview">${escapeHtml(preview)}${preview.length >= 40 ? '...' : ''}</div>
                </div>`;
            }).join('');
        }

        function selectCapture(id) {
            selectedCaptureId = id;
            renderCaptureList();
            const record = captureRecords.find(r => r.id === id);
            if (record) showCaptureDetail(record);
        }

        function showCaptureDetail(record) {
            const detailEl = document.getElementById('capture-detail');

            if (record.phase === 'request') {
                detailEl.innerHTML = renderCaptureRequestDetail(record);
            } else {
                detailEl.innerHTML = renderCaptureResponseDetail(record);
            }
        }

        function renderCaptureRequestDetail(record) {
            const raw = record.raw_request || {};
            const contexts = record.contexts || [];

            let html = `<div class="detail-card">
                <h4>📤 请求概览</h4>
                <div class="stat-grid">
                    <div class="stat-box">
                        <div class="stat-num">${raw.messages?.length || 1}</div>
                        <div class="stat-desc">Messages总数</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-num">${contexts.length}</div>
                        <div class="stat-desc">Context轮数</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-num">${record.extracted_prompt?.length || 0}</div>
                        <div class="stat-desc">Prompt长度</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-num">${record.metadata?.has_images ? '是' : '否'}</div>
                        <div class="stat-desc">包含图片</div>
                    </div>
                </div>
                <div style="margin-bottom: 0.5rem;"><strong style="color: #60a5fa;">模型:</strong> ${record.model || 'unknown'}</div>
                <div style="margin-bottom: 0.5rem;"><strong style="color: #60a5fa;">会话ID:</strong> <span style="font-family: monospace; font-size: 0.875rem;">${record.conversation_id}</span></div>
                <div style="margin-bottom: 0.5rem;"><strong style="color: #60a5fa;">发送者:</strong> ${record.sender?.name} (${record.sender?.id})</div>
            </div>`;

            // System Prompt
            if (record.system_prompt) {
                html += `<div class="detail-card">
                    <h4>⚙️ System Prompt</h4>
                    <div class="prompt-box system-prompt-box">${escapeHtml(record.system_prompt)}</div>
                </div>`;
            }

            // Contexts
            if (contexts.length > 0) {
                html += `<div class="detail-card">
                    <h4>💬 上下文历史 (${contexts.length}轮)</h4>
                    <div class="context-list">
                        ${contexts.map((ctx, idx) => {
                            const role = ctx.role || 'unknown';
                            const content = typeof ctx.content === 'string' ? ctx.content : JSON.stringify(ctx.content);
                            return `<div class="context-item">
                                <div class="context-role">${role} #${idx + 1}</div>
                                <div class="context-content">${escapeHtml(content?.substring(0, 200))}${content?.length > 200 ? '...' : ''}</div>
                            </div>`;
                        }).join('')}
                    </div>
                </div>`;
            }

            // Final Prompt
            if (record.extracted_prompt) {
                html += `<div class="detail-card">
                    <h4>📝 最终Prompt (经过所有插件处理后的)</h4>
                    <div class="prompt-box">${escapeHtml(record.extracted_prompt)}</div>
                </div>`;
            }

            // Raw Request JSON
            html += `<div class="detail-card">
                <h4>🔧 完整原始请求结构 (Raw Request)</h4>
                <div class="raw-json">${escapeHtml(JSON.stringify(raw, null, 2))}</div>
            </div>`;

            return html;
        }

        function renderCaptureResponseDetail(record) {
            return `<div class="detail-card">
                <h4>📥 响应详情</h4>
                <div style="margin-bottom: 1rem;"><strong style="color: #60a5fa;">模型:</strong> ${record.model || 'unknown'}</div>
                <div style="margin-bottom: 1rem;"><strong style="color: #60a5fa;">Token用量:</strong> <pre style="display: inline; font-family: monospace;">${JSON.stringify(record.usage, null, 2)}</pre></div>

                <h4 style="margin-top: 1.5rem; margin-bottom: 0.5rem; color: #60a5fa;">响应内容:</h4>
                <div class="prompt-box" style="border-left-color: #10b981; background: #064e3b;">${escapeHtml(record.response_text || '(空)')}</div>

                <h4 style="margin-top: 1.5rem; margin-bottom: 0.5rem; color: #60a5fa;">原始响应结构:</h4>
                <div class="raw-json">${escapeHtml(JSON.stringify(record.raw_response, null, 2))}</div>
            </div>`;
        }

        async function clearCaptureData() {
            if (!confirm('确定要清空所有抓包数据吗？此操作不可恢复。')) return;
            try {
                const res = await fetch('/api/capture/clear', { method: 'POST' });
                const data = await res.json();
                if (data.success) {
                    captureRecords = [];
                    selectedCaptureId = null;
                    renderCaptureList();
                    document.getElementById('capture-detail').innerHTML = '<div class="empty-state"><div style="font-size: 3rem; margin-bottom: 1rem;">🗑️</div><div>数据已清空</div></div>';
                }
            } catch (e) {
                alert('清空失败: ' + e.message);
            }
        }

        function exportCaptureData() {
            const dataStr = JSON.stringify(captureRecords, null, 2);
            const blob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `llm_capture_${new Date().toISOString().slice(0,19).replace(/:/g,'-')}.json`;
            a.click();
            URL.revokeObjectURL(url);
        }

        function filterCapture() {
            captureFilter = document.getElementById('capture-filter').value;
            renderCaptureList();
        }


        // 修改：showTab函数支持抓包标签
        function showTab(tab) {
            // 隐藏所有section
            document.getElementById('debugger-section').classList.remove('active');
            document.getElementById('morechatplus-section').classList.remove('active');
            document.getElementById('capture-section').classList.remove('active');

            // 重置按钮状态
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            // 显示对应section
            if (tab === 'debugger') {
                document.getElementById('debugger-section').classList.add('active');
            } else if (tab === 'morechatplus') {
                document.getElementById('morechatplus-section').classList.add('active');
                loadMcpStats();
                loadMcpOrigins();
            } else if (tab === 'capture') {
                document.getElementById('capture-section').classList.add('active');
                initCapture(); // 初始化抓包WebSocket
            }
        }

        // 启动
        connect();
    </script>
</body>
</html>
